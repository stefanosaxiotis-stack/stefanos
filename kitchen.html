<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fresh Mail — Παρασκευαστήριο</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#1F2D6E;--pink:#F2C4CE;--white:#FFFFFF;--grey:#f4f2f4;--border:#e8e4e8;--green:#27ae60;--red:#e74c3c;--orange:#f39c12}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--grey);color:#222;min-height:100vh}
    .header{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
    .header-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--pink);letter-spacing:2px}
    .header-right{display:flex;align-items:center;gap:16px}
    .header-user{font-size:13px;color:rgba(242,196,206,0.7)}
    .btn-logout{background:rgba(242,196,206,0.15);border:1px solid rgba(242,196,206,0.3);color:var(--pink);padding:6px 14px;border-radius:6px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;cursor:pointer}
    .btn-logout:hover{background:rgba(242,196,206,0.25)}
    .layout{display:flex;min-height:calc(100vh - 60px)}
    .sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
    .sidebar-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;color:#999;text-transform:uppercase;padding:0 20px 10px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:14px;font-weight:500;color:#555;transition:all 0.15s;border-left:3px solid transparent}
    .nav-item:hover{background:#f8f6f8;color:var(--navy)}
    .nav-item.active{background:#f0edf8;color:var(--navy);border-left-color:var(--navy);font-weight:600}
    .nav-icon{font-size:18px;width:24px;text-align:center}
    .main{flex:1;padding:28px;overflow-x:auto}
    .page-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;color:var(--navy);letter-spacing:1px;margin-bottom:6px}
    .page-sub{font-size:13px;color:#888;margin-bottom:24px}
    .date-selector{display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .date-selector label{font-size:13px;font-weight:600;color:var(--navy)}
    .date-selector input{padding:8px 14px;border:2px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--navy);outline:none}
    .date-selector input:focus{border-color:var(--navy)}
    .btn-load{background:var(--navy);color:var(--pink);border:none;padding:9px 20px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer}
    .card{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
    .card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-head-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--navy);letter-spacing:1px}
    table{width:100%;border-collapse:collapse}
    th{background:#f8f6f8;padding:10px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#888;border-bottom:1px solid var(--border)}
    td{padding:12px 16px;border-bottom:1px solid #f5f3f5;font-size:14px;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fdfcfd}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px}
    .badge-green{background:#e8f8ef;color:var(--green)}
    .badge-orange{background:#fef8e7;color:var(--orange)}
    .badge-navy{background:#eef0f8;color:var(--navy)}
    .total-row td{background:#f0edf8;font-weight:700;color:var(--navy)}
    .store-section{margin-bottom:24px}
    .store-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--navy);letter-spacing:1px;margin-bottom:12px;padding:12px 16px;background:var(--navy);color:var(--pink);border-radius:10px}
    .qty-control{display:flex;align-items:center;gap:6px}
    .qty-btn{width:28px;height:28px;border-radius:6px;border:2px solid var(--navy);background:var(--white);color:var(--navy);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;line-height:1}
    .qty-btn:hover{background:var(--navy);color:var(--pink)}
    .qty-input{width:52px;text-align:center;border:2px solid var(--border);border-radius:6px;padding:4px;font-family:'Barlow',sans-serif;font-size:15px;font-weight:700;color:var(--navy);outline:none}
    .qty-input:focus{border-color:var(--navy)}
    .btn-complete{background:var(--green);color:white;border:none;padding:10px 20px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;transition:background 0.2s}
    .btn-complete:hover{background:#219a52}
    .btn-complete:disabled{opacity:0.5;pointer-events:none}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal{background:var(--white);border-radius:20px;width:420px;max-width:95vw;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--navy);margin-bottom:16px}
    .modal-icon{font-size:48px;text-align:center;margin-bottom:12px}
    .modal-sub{font-size:14px;color:#888;margin-bottom:20px;text-align:center}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end}
    .btn-cancel{background:var(--grey);color:#555;border:none;padding:10px 20px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;cursor:pointer}
    .btn-ok{background:var(--navy);color:var(--pink);border:none;padding:10px 20px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer}
    .loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
    .empty{text-align:center;padding:40px;color:#aaa;font-size:14px}
    .hidden{display:none}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
    .summary-card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:16px;text-align:center}
    .summary-number{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:32px;color:var(--navy)}
    .summary-label{font-size:12px;color:#888;margin-top:4px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">☕ Fresh Mail — Παρασκευαστήριο</div>
  <div class="header-right">
    <div class="header-user" id="headerUser"></div>
    <button class="btn-logout" onclick="fmLogout()">ΕΞΟΔΟΣ</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Μενού</div>
    <div class="nav-item active" onclick="showTab('production')" id="nav-production">
      <span class="nav-icon">🏭</span> Παραγωγή
    </div>
    <div class="nav-item" onclick="showTab('packing')" id="nav-packing">
      <span class="nav-icon">📦</span> Συσκευασία
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="loading">Φόρτωση...</div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-icon">✅</div>
    <div class="modal-title" style="text-align:center">Αποστολή Ολοκληρώθηκε!</div>
    <div class="modal-sub" id="successText"></div>
    <div class="modal-footer" style="justify-content:center">
      <button class="btn-ok" onclick="closeSuccess()">OK</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var FM_URL = 'https://slkgziugmtisawxeycmv.supabase.co';
  var FM_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsa2d6aXVnbXRpc2F3eGV5Y212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUxNTUsImV4cCI6MjA4ODI4MTE1NX0.LVfCr7iF4ypR5vDsUzCZ32iKfbk0CVVS6fKWDBCH62k';
  var fmDb = window.supabase.createClient(FM_URL, FM_KEY);
  var currentUser = null;
  var selectedDate = new Date();
  selectedDate.setDate(selectedDate.getDate()+1);
  var sentQtys = {}; // {orderId_productId: qty}

  // ── Auth ──────────────────────────────────────────────────
  (async function(){
    var s = await fmDb.auth.getSession();
    if (!s.data||!s.data.session){location.href='giris.html';return;}
    var u = await fmDb.from('χρήστες').select('*').eq('auth_user_id',s.data.session.user.id).single();
    if (!u.data||u.data['ρόλος']!=='kitchen'){location.href='giris.html';return;}
    currentUser = u.data;
    document.getElementById('headerUser').textContent = u.data['όνομα'];
    showTab('production');
  })();

  async function fmLogout(){
    await fmDb.auth.signOut();
    location.href='giris.html';
  }

  function showTab(tab){
    ['production','packing'].forEach(function(t){
      document.getElementById('nav-'+t).classList.toggle('active',t===tab);
    });
    if (tab==='production') renderProduction();
    if (tab==='packing')    renderPacking();
  }

  function getSelectedDate(){
    var d = document.getElementById('dateSelect');
    return d ? d.value : selectedDate.toISOString().split('T')[0];
  }

  // ── Production View ───────────────────────────────────────
  async function renderProduction(){
    var main = document.getElementById('mainContent');
    var dateStr = selectedDate.toISOString().split('T')[0];
    main.innerHTML = '<div class="loading">Φόρτωση παραγγελιών...</div>';

    // Φόρτωσε παραγγελίες για την ημερομηνία
    var r = await fmDb.from('παραγγελίες')
      .select('id, κατάστημα_id, τύπος, κατάσταση, καταστήματα(όνομα), γραμμές_παραγγελίας(προϊόν_id, ποσότητα_ζητήθηκε, προϊόντα(όνομα,κατηγορία))')
      .eq('ημερομηνία_παράδοσης', dateStr)
      .in('κατάσταση', ['υποβλήθηκε','σε_εξέλιξη']);

    var orders = r.data || [];

    // Συγκεντρωτικά ανά προϊόν
    var totals = {};
    orders.forEach(function(o){
      (o['γραμμές_παραγγελίας']||[]).forEach(function(l){
        var pid = l['προϊόν_id'];
        var name = l['προϊόντα']['όνομα'];
        var cat  = l['προϊόντα']['κατηγορία'];
        if (!totals[pid]) totals[pid] = {name:name, cat:cat, qty:0};
        totals[pid].qty += l['ποσότητα_ζητήθηκε'];
      });
    });

    var html = '<div class="page-title">Παραγωγή</div>';
    html += '<div class="date-selector">';
    html += '<label>Ημερομηνία παράδοσης:</label>';
    html += '<input type="date" id="dateSelect" value="'+dateStr+'" onchange="onDateChange(this.value)"/>';
    html += '</div>';

    if (orders.length === 0) {
      html += '<div class="card"><div class="empty">Δεν υπάρχουν παραγγελίες για αυτή την ημερομηνία</div></div>';
      main.innerHTML = html;
      return;
    }

    // Stats
    var totalItems = Object.values(totals).reduce(function(a,b){return a+b.qty},0);
    html += '<div class="summary-grid">';
    html += '<div class="summary-card"><div class="summary-number">'+orders.length+'</div><div class="summary-label">Παραγγελίες</div></div>';
    html += '<div class="summary-card"><div class="summary-number">'+Object.keys(totals).length+'</div><div class="summary-label">Προϊόντα</div></div>';
    html += '<div class="summary-card"><div class="summary-number">'+totalItems+'</div><div class="summary-label">Συνολικά Τεμάχια</div></div>';
    html += '</div>';

    // Ομαδοποίηση ανά κατηγορία
    var byCat = {};
    Object.values(totals).forEach(function(p){
      if (!byCat[p.cat]) byCat[p.cat] = [];
      byCat[p.cat].push(p);
    });

    html += '<div class="card"><div class="card-head"><div class="card-head-title">ΣΥΓΚΕΝΤΡΩΤΙΚΗ ΠΑΡΑΓΩΓΗ</div></div>';
    html += '<table><thead><tr><th>Κατηγορία</th><th>Προϊόν</th><th>Συνολική Ποσότητα</th></tr></thead><tbody>';

    Object.keys(byCat).sort().forEach(function(cat){
      var catTotal = byCat[cat].reduce(function(a,b){return a+b.qty},0);
      byCat[cat].sort(function(a,b){return a.name.localeCompare(b.name)}).forEach(function(p,i){
        html += '<tr>';
        html += '<td>'+(i===0?'<span class="badge badge-navy">'+cat+'</span>':'')+'</td>';
        html += '<td><strong>'+p.name+'</strong></td>';
        html += '<td><strong style="font-size:18px;color:var(--navy)">'+p.qty+'</strong></td>';
        html += '</tr>';
      });
      html += '<tr class="total-row"><td colspan="2">Σύνολο '+cat+'</td><td>'+catTotal+'</td></tr>';
    });

    html += '</tbody></table></div>';
    main.innerHTML = html;
  }

  function onDateChange(val){
    selectedDate = new Date(val);
    showTab('production');
  }

  // ── Packing View ──────────────────────────────────────────
  async function renderPacking(){
    var main = document.getElementById('mainContent');
    var dateStr = selectedDate.toISOString().split('T')[0];
    main.innerHTML = '<div class="loading">Φόρτωση συσκευασίας...</div>';

    var r = await fmDb.from('παραγγελίες')
      .select('id, κατάστημα_id, τύπος, κατάσταση, καταστήματα(όνομα), γραμμές_παραγγελίας(id,προϊόν_id,ποσότητα_ζητήθηκε,ποσότητα_στάλθηκε,προϊόντα(όνομα,ημέρες_ζωής))')
      .eq('ημερομηνία_παράδοσης', dateStr)
      .in('κατάσταση', ['υποβλήθηκε','σε_εξέλιξη'])
      .order('κατάστημα_id');

    var orders = r.data || [];

    var html = '<div class="page-title">Συσκευασία & Αποστολή</div>';
    html += '<div class="date-selector">';
    html += '<label>Ημερομηνία παράδοσης:</label>';
    html += '<input type="date" id="dateSelect2" value="'+dateStr+'" onchange="onDateChange2(this.value)"/>';
    html += '</div>';

    if (orders.length === 0) {
      html += '<div class="card"><div class="empty">Δεν υπάρχουν παραγγελίες για αυτή την ημερομηνία</div></div>';
      main.innerHTML = html;
      return;
    }

    // Ομαδοποίηση ανά κατάστημα
    var byStore = {};
    orders.forEach(function(o){
      var sname = o['καταστήματα']['όνομα'];
      if (!byStore[sname]) byStore[sname] = {storeId: o['κατάστημα_id'], orders:[]};
      byStore[sname].orders.push(o);
    });

    Object.keys(byStore).forEach(function(storeName){
      var storeData = byStore[storeName];
      html += '<div class="store-section">';
      html += '<div class="store-title">🏪 '+storeName+'</div>';

      storeData.orders.forEach(function(order){
        var typeLabel = order['τύπος']==='συμπληρωματική' ? '⚡ Συμπληρωματική' : '📋 Κανονική';
        html += '<div class="card" style="margin-bottom:12px">';
        html += '<div class="card-head"><div class="card-head-title">'+typeLabel+'</div>';
        html += '<button class="btn-complete" onclick="completeOrder('+order.id+',\''+storeName+'\')">✅ Ολοκλήρωση Αποστολής</button>';
        html += '</div>';
        html += '<table><thead><tr><th>Προϊόν</th><th>Ζητήθηκαν</th><th>Στέλνονται</th><th>Λήξη</th></tr></thead><tbody>';

        (order['γραμμές_παραγγελίας']||[]).forEach(function(l){
          var defaultExpiry = new Date(dateStr);
          defaultExpiry.setDate(defaultExpiry.getDate() + (l['προϊόντα']['ημέρες_ζωής']||3) - 1);
          var expiryStr = defaultExpiry.toISOString().split('T')[0];
          var key = order.id+'_'+l.id;
          var sentVal = sentQtys[key] !== undefined ? sentQtys[key] : l['ποσότητα_ζητήθηκε'];

          html += '<tr>';
          html += '<td><strong>'+l['προϊόντα']['όνομα']+'</strong></td>';
          html += '<td><span class="badge badge-navy">'+l['ποσότητα_ζητήθηκε']+'</span></td>';
          html += '<td><div class="qty-control">';
          html += '<button class="qty-btn" onclick="changeSent(\''+key+'\','+l.id+',-1)">−</button>';
          html += '<input class="qty-input" type="number" id="sent-'+key+'" value="'+sentVal+'" min="0" onchange="setSent(\''+key+'\','+l.id+',this.value)"/>';
          html += '<button class="qty-btn" onclick="changeSent(\''+key+'\','+l.id+',1)">+</button>';
          html += '</div></td>';
          html += '<td><input type="date" id="exp-'+key+'" value="'+expiryStr+'" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px"/></td>';
          html += '</tr>';
        });

        html += '</tbody></table></div>';
      });
      html += '</div>';
    });

    main.innerHTML = html;
  }

  function onDateChange2(val){
    selectedDate = new Date(val);
    showTab('packing');
  }

  function changeSent(key, lineId, delta){
    var input = document.getElementById('sent-'+key);
    var val = Math.max(0,(parseInt(input.value)||0)+delta);
    input.value = val;
    sentQtys[key] = val;
  }

  function setSent(key, lineId, val){
    sentQtys[key] = Math.max(0,parseInt(val)||0);
  }

  async function completeOrder(orderId, storeName){
    if (!confirm('Ολοκλήρωση αποστολής για '+storeName+';')) return;

    // Βρες τις γραμμές
    var linesR = await fmDb.from('γραμμές_παραγγελίας')
      .select('id, προϊόν_id, ποσότητα_ζητήθηκε, προϊόντα(ημέρες_ζωής)')
      .eq('παραγγελία_id', orderId);

    var lines = linesR.data || [];
    var dateStr = selectedDate.toISOString().split('T')[0];

    // Ενημέρωσε γραμμές και φτιάξε παρτίδες
    for (var i=0; i<lines.length; i++){
      var l = lines[i];
      var key = orderId+'_'+l.id;
      var sent = sentQtys[key] !== undefined ? sentQtys[key] : l['ποσότητα_ζητήθηκε'];
      var expInput = document.getElementById('exp-'+key);
      var expiry = expInput ? expInput.value : '';

      if (!expiry){
        var d = new Date(dateStr);
        d.setDate(d.getDate()+(l['προϊόντα']['ημέρες_ζωής']||3)-1);
        expiry = d.toISOString().split('T')[0];
      }

      // Ενημέρωσε ποσότητα στάλθηκε
      await fmDb.from('γραμμές_παραγγελίας').update({'ποσότητα_στάλθηκε': sent}).eq('id', l.id);

      // Φτιάξε παρτίδα αν στάλθηκε κάτι
      if (sent > 0){
        // Βρες κατάστημα
        var orderR = await fmDb.from('παραγγελίες').select('κατάστημα_id').eq('id', orderId).single();
        await fmDb.from('παρτιδες_αποθέματος').insert({
          'κατάστημα_id': orderR.data['κατάστημα_id'],
          'προϊόν_id': l['προϊόν_id'],
          'ημερομηνία_παραλαβής': dateStr,
          'ημερομηνία_λήξης': expiry,
          'ποσότητα': sent,
          'υπόλοιπο': sent,
          'παραγγελία_id': orderId
        });
      }
    }

    // Ενημέρωσε κατάσταση παραγγελίας
    await fmDb.from('παραγγελίες').update({'κατάσταση':'ολοκληρώθηκε'}).eq('id', orderId);

    document.getElementById('successText').textContent = 'Η αποστολή για '+storeName+' καταχωρήθηκε και οι παρτίδες stock ενημερώθηκαν!';
    document.getElementById('successModal').classList.add('show');
  }

  function closeSuccess(){
    document.getElementById('successModal').classList.remove('show');
    showTab('packing');
  }
</script>
</body>
</html>
