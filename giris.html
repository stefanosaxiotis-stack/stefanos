<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fresh Mail — Είσοδος</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#1F2D6E;--pink:#F2C4CE;--white:#FFFFFF;--navy2:#162058;--grey:#f7f4f6;--err:#c0392b;--green:#27ae60}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:'Barlow',sans-serif;overflow:hidden;position:relative}
    .bg-shapes{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .bg-shapes span{position:absolute;border-radius:50%;background:var(--pink);opacity:0.06;animation:float linear infinite}
    .bg-shapes span:nth-child(1){width:400px;height:400px;top:-100px;left:-100px;animation-duration:18s}
    .bg-shapes span:nth-child(2){width:250px;height:250px;bottom:-60px;right:-60px;animation-duration:24s;animation-delay:-8s}
    .bg-shapes span:nth-child(3){width:160px;height:160px;top:40%;right:10%;animation-duration:20s;animation-delay:-4s}
    @keyframes float{0%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(180deg)}100%{transform:translateY(0) rotate(360deg)}}
    .card{position:relative;z-index:1;background:var(--white);border-radius:20px;width:420px;max-width:95vw;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.35);animation:slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    .card-header{background:var(--navy);padding:36px 40px 28px;text-align:center;position:relative}
    .card-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:var(--white);border-radius:20px 20px 0 0}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:42px;letter-spacing:2px;color:var(--pink);text-transform:uppercase;line-height:1;text-shadow:3px 3px 0 rgba(0,0,0,0.2)}
    .logo-sub{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:4px;color:rgba(242,196,206,0.6);text-transform:uppercase;margin-top:4px}
    .erp-badge{display:inline-block;margin-top:14px;background:rgba(242,196,206,0.15);border:1px solid rgba(242,196,206,0.3);color:var(--pink);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:5px 14px;border-radius:20px}
    .card-body{padding:32px 40px 40px}
    .form-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--navy);letter-spacing:1px;margin-bottom:24px;text-transform:uppercase}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--navy);margin-bottom:8px;opacity:0.7}
    .field input{width:100%;padding:13px 16px;border:2px solid #e8e4e8;border-radius:10px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--navy);background:var(--grey);outline:none;transition:border-color 0.2s}
    .field input:focus{border-color:var(--navy);background:var(--white)}
    .field input::placeholder{color:#bbb}
    .msg{display:none;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px}
    .msg.error{background:#fdf0ef;border:1px solid #f5c6c2;color:var(--err)}
    .msg.show{display:block}
    .btn-main{width:100%;padding:15px;background:var(--navy);color:var(--pink);border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background 0.2s,transform 0.15s}
    .btn-main:hover{background:var(--navy2);transform:translateY(-1px)}
    .btn-main:disabled{opacity:0.6;pointer-events:none}
    .card-footer{text-align:center;padding:0 40px 28px;font-size:11px;color:#bbb}
  </style>
</head>
<body>
  <div class="bg-shapes"><span></span><span></span><span></span></div>
  <div class="card">
    <div class="card-header">
      <div class="logo-text">Fresh Mail</div>
      <div class="logo-sub">Coffee Roasters</div>
      <div class="erp-badge">ERP System</div>
    </div>
    <div class="card-body">
      <div class="form-title">Είσοδος</div>
      <div class="msg" id="msgBox"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="fmEmail" placeholder="user@freshmail.gr" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Κωδικός</label>
        <input type="password" id="fmPass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-main" id="fmBtn" onclick="doLogin()">ΣΥΝΔΕΣΗ</button>
    </div>
    <div class="card-footer">© 2026 Fresh Mail Coffee Roasters</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var FM_URL = 'https://slkgziugmtisawxeycmv.supabase.co';
    var FM_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsa2d6aXVnbXRpc2F3eGV5Y212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDUxNTUsImV4cCI6MjA4ODI4MTE1NX0.LVfCr7iF4ypR5vDsUzCZ32iKfbk0CVVS6fKWDBCH62k';
    var fmDb = window.supabase.createClient(FM_URL, FM_KEY);

    document.getElementById('fmPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    document.getElementById('fmEmail').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('fmPass').focus(); });

    function showError(msg){
      var el = document.getElementById('msgBox');
      el.textContent = '❌ ' + msg;
      el.className = 'msg error show';
    }

    async function redirectByRole(userId){
      var r = await fmDb.from('χρήστες').select('ρόλος').eq('auth_user_id', userId).single();
      if(!r.data){ showError('Ο χρήστης δεν βρέθηκε στο σύστημα.'); return false; }
      var role = r.data['ρόλος'];
      if(role==='admin')   { location.href='admin.html'; return true; }
      if(role==='kitchen') { location.href='kitchen.html'; return true; }
      if(role==='store')   { location.href='store.html'; return true; }
      return false;
    }

    async function doLogin(){
      var email = document.getElementById('fmEmail').value.trim();
      var pass  = document.getElementById('fmPass').value;
      var btn   = document.getElementById('fmBtn');
      if(!email||!pass){ showError('Συμπλήρωσε email και κωδικό.'); return; }
      btn.disabled=true; btn.textContent='...';
      var r = await fmDb.auth.signInWithPassword({email:email, password:pass});
      if(r.error){
        showError('Λάθος email ή κωδικός.');
        btn.disabled=false; btn.textContent='ΣΥΝΔΕΣΗ';
      } else {
        await redirectByRole(r.data.user.id);
      }
    }

    // Αν είναι ήδη logged in
    (async function(){
      var s = await fmDb.auth.getSession();
      if(s.data&&s.data.session){
        await redirectByRole(s.data.session.user.id);
      }
    })();
  </script>
</body>
</html>
